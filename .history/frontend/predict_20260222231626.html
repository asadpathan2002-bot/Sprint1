<!DOCTYPE html>
<html>
<head>
    <title>TruthLens - Predict</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Pale Gray */
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #ffffff;
        }

        .navbar a {
            text-decoration: none;
            color: #2f4f6f; /* Dusty Blue */
            margin-left: 20px;
            font-weight: 500;
        }

        /* Main Container */
        .container {
            padding: 40px 10%;
        }

        .predict-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .box {
            flex: 1;
            min-width: 300px;
            background-color: #ffffff; /* Off White */
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
        }

        .box h2 {
            color: #2f4f6f;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 14px;
        }

        .result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            color: #2f4f6f;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2f4f6f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Accuracy Section */
        .accuracy-section {
            margin-top: 40px;
            text-align: center;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
        }

        .accuracy-section h3 {
            color: #2f4f6f;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .predict-wrapper {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div><strong>TruthLens</strong></div>
    <div>
        <a href="home.html">Home</a>
        <a href="predict.html">Predict</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="container">

    <div class="predict-wrapper">

        <!-- Left Box -->
        <div class="box">
            <h2>Enter News Article</h2>
            <textarea placeholder="Paste news article here..."></textarea>
            <button onclick="showResult()">Analyze</button>
        </div>

        <!-- Right Box -->
        <div class="box">
            <h2>Prediction Result</h2>
            <div class="result" id="resultText">
                Result will appear here
            </div>
        </div>

    </div>

    <!-- Accuracy Section -->
    <div class="accuracy-section">
        <h3>Model Accuracy & Source</h3>
        <p><strong>Accuracy:</strong> 94%</p>
        <p><strong>Dataset Source:</strong> Kaggle Fake News Dataset</p>
    </div>

</div>

<script>
    function showResult() {
        // Demo logic
        document.getElementById("resultText").innerHTML = "This news appears to be FAKE";
    }
</script>

</body>
</html>
