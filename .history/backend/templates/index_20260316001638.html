<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens - Fake News Detection System</title>

<style>

/* ================= GLOBAL ================= */

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9;
    color: #333;
}

/* ================= NAVBAR ================= */

.navbar {
    background: rgba(0,0,0,0.85);
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    width: 100%;
    z-index: 1000;
}

.logo {
    height: 55px;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 35px;
    margin: 0;
    padding: 0;
}

.nav-links li a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links li a:hover {
    color: #00bfff;
}

/* ================= HERO ================= */

.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    color: white;
}

.hero h1 {
    font-size: 55px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.hero p {
    max-width: 650px;
    font-size: 19px;
    margin-bottom: 35px;
    line-height: 1.7;
    color: #ddd;
}

.hero button {
    padding: 14px 35px;
    font-size: 16px;
    border: none;
    background: linear-gradient(45deg, #007bff, #00bfff);
    color: white;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,191,255,0.6);
}

/* ================= SECTION ================= */

.section {
    padding: 100px 40px;
    text-align: center;

    background: 
        linear-gradient(rgba(30,40,55,0.85), rgba(30,40,55,0.85)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    color: #ffffff;
}

.section h2 {
    font-size: 36px;
    margin-bottom: 15px;
    color: #ffffff;
}

.section p {
    max-width: 700px;
    margin: 0 auto 60px auto;
    font-size: 17px;
    color: #dddddd;
}

/* ===== News Grid Layout ===== */

.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 35px;
    margin-top: 50px;
}

.news-card {
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    transition: all 0.3s ease;
}

.news-card:hover {
    transform: translateY(-10px);
}

.news-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.news-content {
    padding: 22px;
    text-align: left;
}

.category {
    background-color: #c62828;
    color: white;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
}

.news-content a {
    text-decoration: none;
    font-weight: 600;
    color: #1e3c72;
}

/* ================= VIEW ALL ================= */

.view-all-news {
    margin-top: 50px;
    text-align: center;
}

.view-all-news button {
    padding: 14px 30px;
    font-size: 16px;
    background-color: #2F4F6F;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

</style>
</head>

<body>

<nav class="navbar">
    <img src="/static/logo.png" class="logo">
    <ul class="nav-links">
        <li><a href="/predict">Predict</a></li>
        <li><a href="/about">About</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Fake News Detection System</h1>
    <p>
        Detect misinformation instantly with AI-powered analysis.
    </p>

    <button onclick="window.location.href='/predict'">
        Check News Now
    </button>
</div>

<div class="section">

<h2>📰 Trending Misinformation Today</h2>

<div class="news-grid">

<div class="news-card">
<div class="news-content">
<span class="category">Politics</span>
<h3>Government scheme fake</h3>
<a href="/news">Read Full Analysis →</a>
</div>
</div>

<div class="news-card">
<div class="news-content">
<span class="category">Science</span>
<h3>Alien landing fake</h3>
<a href="/news">Read Full Analysis →</a>
</div>
</div>

<div class="news-card">
<div class="news-content">
<span class="category">Health</span>
<h3>Hot water cure fake</h3>
<a href="/news">Read Full Analysis →</a>
</div>
</div>

</div>

<div class="view-all-news">
<button onclick="window.location.href='/news'">
View All Fake News
</button>
</div>

</div>

</body>
</html>
