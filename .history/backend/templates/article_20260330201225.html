<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic Page Title -->
    <title>{{ article.title }}</title>

    <style>

        /* Apply box sizing */
        * {
            box-sizing: border-box;
        }

        /* BODY STYLE */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            /* Background with overlay */
            background:
                linear-gradient(rgba(13, 18, 27, 0.88), rgba(13, 18, 27, 0.92)),
                url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; /* stays on top while scrolling */
            top: 0;
            z-index: 1000;
        }

        /* LOGO IMAGE */
        .logo {
            height: 55px;
        }

        /* NAV LINKS */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        /* NAV LINKS STYLE */
        .nav-links li a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: 0.3s;
        }

        /* HOVER EFFECT */
        .nav-links li a:hover {
            color: #00bfff;
        }

        /* ARTICLE WRAPPER */
        .article-wrapper {
            max-width: 950px;
            margin: 50px auto;
            padding: 0 20px 50px;
        }

        /* ARTICLE CARD */
        .article-card {
            background: rgba(255, 255, 255, 0.95); /* white card */
            color: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        /* ARTICLE IMAGE */
        .article-image {
            width: 100%;
            height: 420px;
            object-fit: cover;
            display: block;
        }

        /* ARTICLE CONTENT */
        .article-content {
            padding: 35px;
        }

        /* CATEGORY BADGE */
        .category-badge {
            display: inline-block;
            background: #c62828;
            color: #fff;
            padding: 7px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* TITLE */
        .article-title {
            font-size: 40px;
            line-height: 1.3;
            margin: 0 0 15px;
            color: #111;
        }

        /* META INFO */
        .article-meta {
            font-size: 15px;
            color: #555;
            margin-bottom: 25px;
        }

        /* RESULT BOX */
        .result-box {
            display: inline-block;
            margin-bottom: 25px;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            background: #ffe5e5;
            color: #b71c1c;
            border-left: 5px solid #d32f2f;
        }

        /* ARTICLE TEXT */
        .article-text {
            font-size: 17px;
            line-height: 1.9;
            color: #2e2e2e;
            text-align: justify;
        }

        /* BACK BUTTON */
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* BACK BUTTON HOVER */
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .article-title {
                font-size: 28px;
            }

            .article-image {
                height: 250px;
            }

            .article-content {
                padding: 22px;
            }

            .article-text {
                font-size: 15px;
            }
        }

        /* TOP NAV BUTTONS */
        .nav-buttons{
            margin:30px 0;
            display:flex;
            gap:15px;
        }

        /* NAV BUTTON STYLE */
        .nav-btn{
            text-decoration:none;
            background:#1e3c72;
            color:white;
            padding:10px 18px;
            border-radius:6px;
            font-size:14px;
            transition:0.3s;
        }

        /* HOVER */
        .nav-btn:hover{
            background:#142a52;
        }

    </style>
</head>

<body>

<!-- TOP NAV BUTTONS -->
<div class="nav-buttons">
    <a href="/" class="nav-btn">← Back to Home</a>
    <a href="/news" class="nav-btn">← Back to News</a>
</div>

<!-- ARTICLE SECTION -->
<div class="article-wrapper">

    <div class="article-card">

        <!-- ARTICLE IMAGE -->
        <img src="{{ article.image }}" alt="{{ article.title }}" class="article-image">

        <div class="article-content">

            <!-- CATEGORY -->
            <span class="category-badge">{{ article.category }}</span>

            <!-- TITLE -->
            <h1 class="article-title">{{ article.title }}</h1>

            <!-- DATE -->
            <div class="article-meta">
                Viral Date: {{ article.date }}
            </div>

            <!-- RESULT -->
            <div class="result-box">
                Result: {{ article.result }}
            </div>

            <!-- FULL TEXT -->
            <div class="article-text">
                {{ article.full_text }}
            </div>

            <!-- BACK BUTTON -->
            <a href="/news" class="back-btn">← Back to News</a>

        </div>
    </div>
</div>

</body>
</html>
