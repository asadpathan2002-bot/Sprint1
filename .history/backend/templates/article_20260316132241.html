<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background:
                linear-gradient(rgba(13, 18, 27, 0.88), rgba(13, 18, 27, 0.92)),
                url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            height: 55px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links li a:hover {
            color: #00bfff;
        }

        .article-wrapper {
            max-width: 950px;
            margin: 50px auto;
            padding: 0 20px 50px;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        .article-image {
            width: 100%;
            height: 420px;
            object-fit: cover;
            display: block;
        }

        .article-content {
            padding: 35px;
        }

        .category-badge {
            display: inline-block;
            background: #c62828;
            color: #fff;
            padding: 7px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .article-title {
            font-size: 40px;
            line-height: 1.3;
            margin: 0 0 15px;
            color: #111;
        }

        .article-meta {
            font-size: 15px;
            color: #555;
            margin-bottom: 25px;
        }

        .result-box {
            display: inline-block;
            margin-bottom: 25px;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            background: #ffe5e5;
            color: #b71c1c;
            border-left: 5px solid #d32f2f;
        }

        .article-text {
            font-size: 17px;
            line-height: 1.9;
            color: #2e2e2e;
            text-align: justify;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .article-title {
                font-size: 28px;
            }

            .article-image {
                height: 250px;
            }

            .article-content {
                padding: 22px;
            }

            .article-text {
                font-size: 15px;
            }
        }


        .nav-buttons{
margin:30px 0;
display:flex;
gap:15px;
}

.nav-btn{
text-decoration:none;
background:#1e3c72;
color:white;
padding:10px 18px;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.nav-btn:hover{
background:#142a52;
}

    </style>
</head>
<body>

<div class="nav-buttons">
    <a href="/" class="nav-btn">← Back to Home</a>
    <a href="/news" class="nav-btn">← Back to News</a>
</div>


   

    <div class="article-wrapper">
        <div class="article-card">
            <img src="{{ article.image }}" alt="{{ article.title }}" class="article-image">

            <div class="article-content">
                <span class="category-badge">{{ article.category }}</span>

                <h1 class="article-title">{{ article.title }}</h1>

                <div class="article-meta">
                    Viral Date: {{ article.date }}
                </div>

                <div class="result-box">
                    Result: {{ article.result }}
                </div>

                <div class="article-text">
                    {{ article.full_text }}
                </div>

                <a href="/news" class="back-btn">← Back to News</a>
            </div>
        </div>
    </div>

</body>
</html>
