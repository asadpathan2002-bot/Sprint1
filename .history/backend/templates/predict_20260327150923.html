<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    /* News style background */
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* MAIN BOX */
.container {
    width: 95%;
    max-width: 1000px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* CARD STYLE */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    padding: 25px;
}

/* HEADINGS */
h2 {
    margin-top: 0;
    color: #1e3c72;
}

/* TEXTAREA */
textarea {
    width: 100%;
    min-height: 250px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 15px;
    resize: none;
    outline: none;
    transition: 0.3s;
}

textarea:focus {
    border-color: #007bff;
    box-shadow: 0 0 0 3px rgba(0,123,255,0.2);
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #007bff, #00bfff);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,123,255,0.3);
}

/* WORD COUNT */
#wordCount {
    font-size: 13px;
    margin-top: 10px;
    color: #555;
}

/* ERROR */
#errorMsg {
    color: red;
    display: none;
    margin-top: 10px;
}

/* LOADER */
.loader {
    display: none;
    text-align: center;
    margin-top: 20px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ccc;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* RESULT BOX */
#resultBox {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
}

/* RESULT COLORS */
.real {
    background: #e8fce8;
    color: green;
}

.fake {
    background: #ffeaea;
    color: red;
}

.error {
    background: #fff3cd;
    color: #856404;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- INPUT -->
    <div class="card">
        <h2>Enter News Article</h2>

        <textarea id="newsInput" placeholder="Paste news here..."></textarea>

        <p id="wordCount">Words: 0 (Min: 50)</p>

        <button onclick="analyzeNews()">Analyze</button>

        <p id="errorMsg">Minimum 50 words required</p>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Analyzing...</p>
        </div>
    </div>

    <!-- RESULT -->
    <div class="card">
        <h2>Result</h2>

        <div id="resultBox"></div>
    </div>

</div>

<script>
const input = document.getElementById("newsInput");
const wordCount = document.getElementById("wordCount");

input.addEventListener("input", () => {
    const words = input.value.trim().split(/\s+/).filter(w => w.length > 0);
    wordCount.textContent = `Words: ${words.length} (Min: 50)`;
});

async function analyzeNews() {
    const text = input.value.trim();
    const count = text.split(/\s+/).filter(w => w.length > 0).length;

    const errorMsg = document.getElementById("errorMsg");
    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("resultBox");

    errorMsg.style.display = "none";

    if (count < 50) {
        errorMsg.style.display = "block";
        return;
    }

    loader.style.display = "block";
    resultBox.style.display = "none";

    try {
        const res = await fetch("/api/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text})
        });

        const data = await res.json();

        loader.style.display = "none";
        resultBox.style.display = "block";

        if (data.prediction === "Real News") {
            resultBox.className = "real";
        } else {
            resultBox.className = "fake";
        }

        resultBox.innerHTML = `
            <h3>${data.prediction}</h3>
            <p>Confidence: ${data.confidence}%</p>
        `;

    } catch {
        loader.style.display = "none";
        resultBox.style.display = "block";
        resultBox.className = "error";
        resultBox.innerHTML = "API Error";
    }
}
</script>

</body>
</html>
