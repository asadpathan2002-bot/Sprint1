<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens - Fake News Detection System</title>

<style>

/* ================= GLOBAL ================= */

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9;
    color: #333;
}

/* ================= NAVBAR ================= */

.navbar {
    background: rgba(0,0,0,0.85);
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    width: 100%;
    z-index: 1000;
}

/* 🔥 NEW STYLISH LOGO */
.brand-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;

    background: linear-gradient(45deg, #00bfff, #007bff, #00ffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow: 0 0 10px rgba(0,191,255,0.6);
}

.brand-name span {
    color: #ffffff;
    -webkit-text-fill-color: white;
    text-shadow: none;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 35px;
    margin: 0;
    padding: 0;
}

.nav-links li a {
    text-decoration: none;
    color: #ffffff;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links li a:hover {
    color: #00bfff;
}

/* ================= HERO ================= */

.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    color: white;
}

.hero h1 {
    font-size: 55px;
    margin-bottom: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.hero p {
    max-width: 650px;
    font-size: 19px;
    margin-bottom: 35px;
    line-height: 1.7;
    color: #ddd;
}

.hero button {
    padding: 14px 35px;
    font-size: 16px;
    border: none;
    background: linear-gradient(45deg, #007bff, #00bfff);
    color: white;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,191,255,0.6);
}

/* ================= SECTION ================= */

.section {
    padding: 100px 40px;
    text-align: center;
    background:
        linear-gradient(rgba(30,40,55,0.85), rgba(30,40,55,0.85)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: #ffffff;
}

.section h2 {
    font-size: 36px;
    margin-bottom: 15px;
}

.section p.section-subtitle {
    max-width: 700px;
    margin: 0 auto 60px auto;
    font-size: 17px;
    color: #dddddd;
}

/* ===== News Grid Layout ===== */

.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 35px;
    margin-top: 50px;
}

.news-card {
    background: #ffffff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    transition: all 0.3s ease;
    text-align: left;
}

.news-card:hover {
    transform: translateY(-10px);
}

.news-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.news-content {
    padding: 22px;
}

.category {
    background-color: #c62828;
    color: white;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 14px;
}

.news-content h3 {
    font-size: 18px;
    color: #111;
}

.meta {
    font-size: 14px;
    color: #666;
}

.desc {
    font-size: 15px;
    color: #444;
}

.news-content a {
    text-decoration: none;
    color: #1e3c72;
}

/* ================= FOOTER ================= */

.footer{
background: linear-gradient(180deg,#0d1b2a,#02080f);
color:white;
padding:60px 50px 20px;
}

.footer-container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:50px;
}

.footer-brand h2{
font-size:24px;
}

.footer-links a{
text-decoration:none;
color:#b0c4de;
}

.footer-bottom{
margin-top:40px;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:15px;
display:flex;
justify-content:space-between;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <!-- 🔥 TEXT LOGO -->
    <div class="brand-name">Truth<span>Lens</span></div>

    <ul class="nav-links">
        <li><a href="/predict">Predict</a></li>
        <li><a href="/about">About</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Fake News Detection System</h1>
    <p>
        Detect misinformation instantly with AI-powered analysis.
        Verify whether a news article is Fake or Real within seconds.
    </p>

    <button onclick="window.location.href='/predict'">
        Check News Now
    </button>
</div>

<!-- rest SAME (no changes) -->

</body>
</html>
