<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Prediction</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* ONLY CHANGE: background */
    background:
        linear-gradient(rgba(20,30,50,0.85), rgba(20,30,50,0.85)),
        url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* keep everything same */
.container {
    max-width: 1200px;
    margin: 60px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ffffff;
}

.subtitle {
    text-align: center;
    color: #dddddd;
    margin-bottom: 30px;
}

.grid {
    display: flex;
    gap: 30px;
}

/* BOXES */
.box {
    flex: 1;
    background: rgba(255,255,255,0.95); /* slight transparency */
    padding: 20px;
    border-radius: 10px;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 200px;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    resize: none;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #2f4f6f;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    background: #1f3a50;
}

/* WORD COUNT */
#wordCount {
    font-size: 13px;
    margin-top: 8px;
    color: #555;
}

/* RESULT */
#resultBox {
    margin-top: 15px;
    padding: 15px;
    border-radius: 6px;
    display: none;
}

.real {
    background: #e6ffe6;
    color: green;
}

.fake {
    background: #ffe6e6;
    color: red;
}

.error {
    background: #fff3cd;
    color: #856404;
}

/* ERROR */
#errorMsg {
    color: red;
    display: none;
}

/* LOADER */
.loader {
    display: none;
    margin-top: 10px;
}

/* BACK BUTTON */
.back {
    text-align: center;
    margin-top: 30px;
}

.back a {
    text-decoration: none;
    background: #444;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="container">

    <h1>News Prediction</h1>
    <p class="subtitle">Analyze whether a news article is Fake or Real using AI</p>

    <div class="grid">

        <!-- LEFT -->
        <div class="box">
            <h2>Enter News Article</h2>

            <textarea id="newsInput" placeholder="Paste news article here..."></textarea>

            <p id="wordCount">Words: 0 (Min: 50)</p>

            <button onclick="analyzeNews()">Analyze</button>

            <p id="errorMsg">Minimum 50 words required</p>

            <div id="loader" class="loader">
                <p>Analyzing...</p>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="box">
            <h2>Prediction Result</h2>

            <div id="resultBox"></div>
        </div>

    </div>

    <div class="back">
        <a href="/">← Back to Home</a>
    </div>

</div>

<script>
const input = document.getElementById("newsInput");
const wordCount = document.getElementById("wordCount");

input.addEventListener("input", () => {
    const words = input.value.trim().split(/\s+/).filter(w => w.length > 0);
    wordCount.textContent = `Words: ${words.length} (Min: 50)`;
});

async function analyzeNews() {
    const text = input.value.trim();
    const count = text.split(/\s+/).filter(w => w.length > 0).length;

    const errorMsg = document.getElementById("errorMsg");
    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("resultBox");

    errorMsg.style.display = "none";

    if (count < 50) {
        errorMsg.style.display = "block";
        return;
    }

    loader.style.display = "block";
    resultBox.style.display = "none";

    try {
        const res = await fetch("/api/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text})
        });

        const data = await res.json();

        loader.style.display = "none";
        resultBox.style.display = "block";

        if (data.prediction === "Real News") {
            resultBox.className = "real";
        } else {
            resultBox.className = "fake";
        }

        resultBox.innerHTML = `
            <h3>${data.prediction}</h3>
            <p>Confidence: ${data.confidence}%</p>
        `;

    } catch {
        loader.style.display = "none";
        resultBox.style.display = "block";
        resultBox.className = "error";
        resultBox.innerHTML = "API Error";
    }
}
</script>

</body>
</html>
