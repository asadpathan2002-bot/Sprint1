<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens - Predict</title>

<style>

/* ===== BODY (Dark News Theme) ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                url("https://images.unsplash.com/photo-1504711434969-e33886168f5c");
    background-size: cover;
    background-position: center;
    color: white;
}

/* ===== MAIN CONTAINER ===== */
.container {
    display: flex;
    gap: 40px;
    padding: 80px 40px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
}

/* ===== CARDS ===== */
.card {
    width: 450px;
    background: rgba(0,0,0,0.65);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card h2 {
    margin-bottom: 20px;
}

/* ===== TEXTAREA ===== */
textarea {
    width: 100%;
    height: 200px;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: none;
    resize: none;
    font-size: 14px;
}

/* ===== BUTTON ===== */
button {
    padding: 10px 25px;
    background-color: #1e3c72;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background-color: #16325c;
}

/* ===== RESULT BOX ===== */
#resultBox {
    display: none;
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
}

.fake {
    background-color: rgba(255, 0, 0, 0.2);
    color: #ff4d4d;
}

.real {
    background-color: rgba(0, 255, 0, 0.2);
    color: #66ff66;
}

/* ===== ACCURACY SECTION ===== */
#accuracySection {
    display: none;
    text-align: center;
    margin: 30px auto;
    width: 400px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
}

/* ===== BACK BUTTON ===== */
.back-btn {
    text-align: center;
    margin-top: 40px;
}

</style>
</head>

<body>

<!-- MAIN -->
<div class="container">

    <!-- Input Card -->
    <div class="card">
        <h2>Enter News Article</h2>
        <textarea id="newsInput" placeholder="Paste news article here..."></textarea>
        <button onclick="analyzeNews()">Analyze</button>
    </div>

    <!-- Result Card -->
    <div class="card">
        <h2>Prediction Result</h2>
        <div id="resultBox"></div>
    </div>

</div>

<!-- Accuracy Section -->
<div id="accuracySection">
    <h3>Model Performance</h3>
    <p><strong>Model Accuracy:</strong> 94%</p>
</div>

<!-- Back Button -->
<div class="back-btn">
    <a href="/">
        <button>⬅ Back to Home</button>
    </a>
</div>

<script>

function analyzeNews() {

    const newsText = document.getElementById("newsInput").value;

    if(newsText.trim() === "") {
        alert("Please enter news article.");
        return;
    }

    const random = Math.random();
    const resultBox = document.getElementById("resultBox");
    const accuracySection = document.getElementById("accuracySection");

    let label, confidence;

    if(random > 0.5){
        label = "Real News";
        confidence = (80 + Math.random()*20).toFixed(2);
        resultBox.className = "real";
    } else {
        label = "Fake News";
        confidence = (80 + Math.random()*20).toFixed(2);
        resultBox.className = "fake";
    }

    resultBox.innerHTML = `
        <h3>${label}</h3>
        <p><strong>Confidence:</strong> ${confidence}%</p>
    `;

    resultBox.style.display = "block";
    accuracySection.style.display = "block";
}

</script>

</body>
</html>
